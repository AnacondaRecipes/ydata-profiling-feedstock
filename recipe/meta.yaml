{% set name = "ydata-profiling" %}
{% set version = "4.18.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-', '_')}}-{{ version }}.tar.gz
  sha256: c3a0afd82e605c6903dd140b5fc41dabad8ee690601ad3d6c27da28e80b07cc6

build:
  number: 0
  entry_points:
    - ydata_profiling = ydata_profiling.controller.console:main
    - pandas_profiling = ydata_profiling.controller.console:main
  script: 
    - echo {{ version }} > ${SRC_DIR}/VERSION  # [not win]
    - echo {{ version }} > "%SRC_DIR%\VERSION"  # [win]
    - {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  skip: True  # [py<310 or py>313]

requirements:
  host:
    - python
    - pip
    - setuptools >=72.0.0,<80.0.0
    - setuptools-scm >=8.0.0,<9.0.0
    - wheel >=0.38.4,<1.0.0
  run:
    - python
    - scipy >=1.8,<1.17
    - pandas >1.5,<3.0,!=1.4.0
    - matplotlib >=3.5,<=3.10
    - pydantic >=2,<3
    - PyYAML >=6.0.3,<6.1
    - jinja2 >=3.1.6,<3.2
    - visions >=0.7.5,<0.8.2
    - numpy >=1.22,<2.4
    # Could be optional
    # Related to HTML report
    - minify-html >=0.15.0
    - filetype >=1.0.0
    # Correlations
    - phik >=0.12.5,<0.13
    # Examples
    - requests >=2.32.0,<3
    # Progress bar
    - tqdm >=4.66.3,<5
    - seaborn >=0.10.1,<0.14
    - multimethod >=1.4,<2
    # metrics
    - statsmodels >=0.13.2,<1
    # type checking
    - typeguard >=4,<5
    - imagehash ==4.3.2
    - wordcloud >=1.9.4
    - dacite >=1.9,<2
    - numba >=0.60,<0.63
  run_constrained:
    - jupyter >=1.0.0
    - ipywidgets >=7.5.1
    - tangled-up-in-unicode ==0.2.0

test:
  imports:
    - pandas_profiling
    - ydata_profiling
  commands:
    - pip check
    - ydata_profiling --help
    - pandas_profiling --help
  requires:
    - pip

about:
  home: https://ydata.ai
  summary: Generate profile report for pandas DataFrame
  description: |
    ydata-profiling primary goal is to provide a one-line Exploratory
    Data Analysis (EDA) experience in a consistent and fast solution.
    Like pandas df.describe() function, that is so handy, ydata-profiling
    delivers an extended analysis of a DataFrame while allowing the data
    analysis to be exported in different formats such as html and json.
  license: MIT
  license_family: MIT
  license_file: LICENSE
  doc_url: https://docs.profiling.ydata.ai/latest
  dev_url: https://github.com/ydataai/ydata-profiling

extra:
  recipe-maintainers:
    - rxm7706